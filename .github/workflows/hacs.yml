name: HACS Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-hacs:
    name: Validate HACS manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate HACS manifest
        uses: hacs/integration-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
