name: Hassfest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  hassfest:
    name: Run hassfest (integrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hassfest
        uses: home-assistant/hassfest-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
